name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm 11.11.0
        run: npm install -g npm@11.11.0

      - name: Install dependencies
        run: npm ci

      - name: Prepare test artifact directory
        run: mkdir -p artifacts/test-reports

      - name: Run backend unit tests
        run: npm run test:unit:ci

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-test-reports
          path: artifacts/test-reports/unit.tap
          if-no-files-found: warn

  backend-e2e-tests:
    name: Backend E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm 11.11.0
        run: npm install -g npm@11.11.0

      - name: Install dependencies
        run: npm ci

      - name: Prepare test artifact directory
        run: mkdir -p artifacts/test-reports

      - name: Run backend e2e tests
        run: npm run test:e2e:ci

      - name: Upload backend e2e reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-test-reports
          path: artifacts/test-reports/e2e.tap
          if-no-files-found: warn

  build-artifacts:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs:
      - backend-unit-tests
      - backend-e2e-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm 11.11.0
        run: npm install -g npm@11.11.0

      - name: Install dependencies
        run: npm ci

      - name: Build backend package
        run: npm run build:backend

      - name: Upload backend build output
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-output
          path: artifacts/backend/
          if-no-files-found: warn
