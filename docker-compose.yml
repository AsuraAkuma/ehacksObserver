version: "3.9"

services:
  ehacksobserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: asura/ehacksobserver:latest
    container_name: ehacksobserver
    env_file:
      - .env
    environment:
      WEBHOOK_HOST: 0.0.0.0
      WEBHOOK_PORT: 5508
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
    network_mode: "host"
    restart: unless-stopped
